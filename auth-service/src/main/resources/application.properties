spring.application.name=auth-service
server.port=8081

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# JPA config (update according to your db)
spring.datasource.url=jdbc:mysql://localhost:3306/pg_accommodation
spring.datasource.username=root
spring.datasource.password=160702
spring.jpa.hibernate.ddl-auto=update

jwt.secret=MySuperSecureJwtSecretKeyThatIsLongEnough123
jwt.expiration=3600000 

logging.level.org.springframework.security=DEBUG

# Disable Spring MVC CORS handling
spring.web.cors.enabled=false

# Mail Config (Replace with your actual SMTP details)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
