<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login - PG Accommodations</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet"/>
<script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#4F46E5", // Indigo-600, a modern premium SaaS blue/indigo
                        "primary-hover": "#4338CA", // Indigo-700
                        "background-light": "#F3F4F6", // Gray-100
                        "background-dark": "#111827", // Gray-900
                        "card-light": "#FFFFFF",
                        "card-dark": "#1F2937", // Gray-800
                    },
                    fontFamily: {
                        display: ["Montserrat", "sans-serif"],
                        body: ["Inter", "sans-serif"],
                    },
                    borderRadius: {
                        DEFAULT: "0.5rem",
                        'xl': "1rem",
                        '2xl': "1.5rem",
                    },
                    boxShadow: {
                        'soft': '0 10px 40px -10px rgba(0,0,0,0.08)',
                    }
                },
            },
        };
    </script>
<script>
        // Check for dark mode preference
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark')
        } else {
            document.documentElement.classList.remove('dark')
        }
        function toggleDarkMode() {
            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('dark');
                localStorage.theme = 'light';
            } else {
                document.documentElement.classList.add('dark');
                localStorage.theme = 'dark';
            }
        }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark font-body antialiased transition-colors duration-300 min-h-screen flex flex-col">
<nav class="bg-primary shadow-lg">
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
<div class="flex items-center justify-between h-16">
<div class="flex items-center">
<a class="flex-shrink-0 flex items-center gap-2" href="#">
<span class="material-icons-outlined text-white text-3xl">home_work</span>
<span class="text-white text-xl font-display font-bold">PG Accommodations</span>
</a>
</div>
<div class="flex items-center space-x-4">
<button class="p-2 rounded-full text-indigo-100 hover:bg-indigo-500 focus:outline-none focus:bg-indigo-500 transition-colors" onclick="toggleDarkMode()">
<span class="material-icons-outlined dark:hidden">dark_mode</span>
<span class="material-icons-outlined hidden dark:block">light_mode</span>
</button>
<a class="text-white hover:bg-indigo-500 px-3 py-2 rounded-md text-sm font-medium transition-colors" href="#">Home</a>
<a class="bg-white text-primary hover:bg-indigo-50 px-3 py-2 rounded-md text-sm font-bold transition-colors shadow-sm" href="#">Register</a>
</div>
</div>
</div>
</nav>
<main class="flex-grow flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8 relative overflow-hidden">
<div class="absolute top-0 left-0 w-full h-full overflow-hidden z-0 pointer-events-none">
<div class="absolute -top-24 -left-24 w-96 h-96 bg-primary opacity-5 rounded-full blur-3xl dark:opacity-10"></div>
<div class="absolute top-1/2 right-0 w-64 h-64 bg-purple-500 opacity-5 rounded-full blur-3xl transform translate-x-1/2 dark:opacity-10"></div>
</div>
<div class="max-w-md w-full space-y-8 bg-card-light dark:bg-card-dark p-8 sm:p-10 rounded-2xl shadow-soft z-10 border border-gray-100 dark:border-gray-700 transition-all duration-300">
<div class="text-center">
<div class="mx-auto h-12 w-12 bg-indigo-100 dark:bg-indigo-900 rounded-full flex items-center justify-center mb-4">
<span class="material-icons-outlined text-primary text-2xl">lock</span>
</div>
<h2 class="text-3xl font-display font-bold text-slate-800 dark:text-white mb-2">
                    Welcome
                </h2>
<p class="text-sm text-slate-500 dark:text-slate-400">
                    Sign in to manage your bookings and properties
                </p>
</div>
<form action="#" class="mt-8 space-y-6" method="POST">
<div class="space-y-5">
<div>
<label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1" for="username">
                            Username
                        </label>
<div class="relative rounded-md shadow-sm">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-icons-outlined text-slate-400 text-lg">person</span>
</div>
<input autocomplete="username" class="focus:ring-primary focus:border-primary block w-full pl-10 sm:text-sm border-gray-300 dark:border-gray-600 rounded-lg py-3 bg-white dark:bg-gray-800 text-slate-900 dark:text-white placeholder-slate-400 focus:outline-none transition-shadow" id="username" name="username" placeholder="Enter your username" required="" type="text"/>
</div>
</div>
<div>
<div class="flex items-center justify-between mb-1">
<label class="block text-sm font-medium text-slate-700 dark:text-slate-300" for="password">
                                Password
                            </label>
<div class="text-sm">
<a class="font-medium text-primary hover:text-primary-hover transition-colors" href="#">
                                    Forgot password?
                                </a>
</div>
</div>
<div class="relative rounded-md shadow-sm">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-icons-outlined text-slate-400 text-lg">key</span>
</div>
<input autocomplete="current-password" class="focus:ring-primary focus:border-primary block w-full pl-10 sm:text-sm border-gray-300 dark:border-gray-600 rounded-lg py-3 bg-white dark:bg-gray-800 text-slate-900 dark:text-white placeholder-slate-400 focus:outline-none transition-shadow" id="password" name="password" placeholder="Enter your password" required="" type="password"/>
</div>
</div>
</div>
<div class="flex items-center">
<input class="h-4 w-4 text-primary focus:ring-primary border-gray-300 rounded dark:border-gray-600 dark:bg-gray-700" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-2 block text-sm text-slate-700 dark:text-slate-300" for="remember-me">
                        Remember me for 30 days
                    </label>
</div>
<div>
<button class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-semibold rounded-lg text-white bg-primary hover:bg-primary-hover focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary shadow-md hover:shadow-lg transition-all duration-200" type="submit">
<span class="absolute left-0 inset-y-0 flex items-center pl-3">
<span class="material-icons-outlined text-indigo-300 group-hover:text-indigo-200 text-lg transition-colors">login</span>
</span>
                        Sign in
                    </button>
</div>
<div class="relative mt-6">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-gray-200 dark:border-gray-700"></div>
</div>
<div class="relative flex justify-center text-sm">
<span class="px-2 bg-card-light dark:bg-card-dark text-slate-500 dark:text-slate-400">
                            Or continue with
                        </span>
</div>
</div>
<div class="grid grid-cols-2 gap-3 mt-4">
<button class="w-full inline-flex justify-center py-2.5 px-4 border border-gray-300 dark:border-gray-600 rounded-lg shadow-sm bg-white dark:bg-gray-800 text-sm font-medium text-slate-700 dark:text-slate-200 hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors" type="button">
<svg aria-hidden="true" class="h-5 w-5 text-gray-500 dark:text-gray-400" fill="currentColor" viewBox="0 0 24 24">
<path d="M12.545,10.239v3.821h5.445c-0.712,2.315-2.647,3.972-5.445,3.972c-3.332,0-6.033-2.701-6.033-6.032s2.701-6.032,6.033-6.032c1.498,0,2.866,0.549,3.921,1.453l2.814-2.814C17.503,2.988,15.139,2,12.545,2C7.021,2,2.543,6.477,2.543,12s4.478,10,10.002,10c8.396,0,10.249-7.85,9.426-11.748L12.545,10.239z"></path>
</svg>
<span class="ml-2">Google</span>
</button>
<button class="w-full inline-flex justify-center py-2.5 px-4 border border-gray-300 dark:border-gray-600 rounded-lg shadow-sm bg-white dark:bg-gray-800 text-sm font-medium text-slate-700 dark:text-slate-200 hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors" type="button">
<svg aria-hidden="true" class="h-5 w-5 text-[#1877F2]" fill="currentColor" viewBox="0 0 24 24">
<path clip-rule="evenodd" d="M22 12c0-5.523-4.477-10-10-10S2 6.477 2 12c0 4.991 3.657 9.128 8.438 9.878v-6.987h-2.54V12h2.54V9.797c0-2.506 1.492-3.89 3.777-3.89 1.094 0 2.238.195 2.238.195v2.46h-1.26c-1.243 0-1.63.771-1.63 1.562V12h2.773l-.443 2.89h-2.33v6.988C18.343 21.128 22 16.991 22 12z" fill-rule="evenodd"></path>
</svg>
<span class="ml-2">Facebook</span>
</button>
</div>
</form>
<p class="mt-4 text-center text-sm text-slate-500 dark:text-slate-400">
                Don't have an account? 
                <a class="font-medium text-primary hover:text-primary-hover transition-colors" href="#">
                    Register now
                </a>
</p>
</div>
</main>
<footer class="bg-white dark:bg-gray-900 border-t border-gray-200 dark:border-gray-800 mt-auto">
<div class="max-w-7xl mx-auto py-6 px-4 sm:px-6 lg:px-8">
<p class="text-center text-sm text-gray-500 dark:text-gray-400">
                © 2024 PG Accommodations. All rights reserved.
            </p>
</div>
</footer>

</body></html>
